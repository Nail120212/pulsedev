<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexxToHub</title>
  <link rel="icon" type="image/png" href="pulsedevlogo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --neon-cyan:    #00f5ff;
      --neon-purple:  #bf00ff;
      --glass-bg:     rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.08);
      --glass-hover:  rgba(255,255,255,0.07);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Syne', sans-serif;
      background: #080810;
      color: #e2e8f0;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 15% 20%, rgba(0,245,255,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 85% 75%, rgba(191,0,255,0.06) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none; z-index: 0;
    }
    .layer { position: relative; z-index: 1; }
    #captcha-screen {
      position: fixed; inset: 0; z-index: 200;
      background: #080810;
      display: flex; align-items: center; justify-content: center;
    }
    #captcha-screen::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 30% 30%, rgba(0,245,255,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 75% 70%, rgba(191,0,255,0.08) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }
    #captcha-screen::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none; z-index: 0;
    }
    .captcha-card {
      position: relative; z-index: 1;
      width: 440px;
      max-width: calc(100vw - 40px);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 22px;
      padding: 40px 36px 34px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 40px 100px rgba(0,0,0,0.7),
        0 0 80px rgba(0,245,255,0.05);
      display: flex; flex-direction: column; align-items: center; gap: 22px;
      animation: captchaIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes captchaIn {
      from { opacity: 0; transform: translateY(24px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .captcha-logo { display: flex; align-items: center; gap: 10px; }
    .captcha-logo img { width: 38px; height: 38px; object-fit: contain; border-radius: 9px; }
    .captcha-logo-text { font-size: 22px; font-weight: 800; color: #f1f5f9; letter-spacing: -0.03em; }
    .captcha-logo-text em { color: var(--neon-cyan); font-style: normal; text-shadow: 0 0 12px rgba(0,245,255,0.5); }
    .captcha-quote {
      font-size: 13px; color: #64748b; text-align: center; line-height: 1.7;
      font-style: italic; font-family: 'DM Mono', monospace; padding: 0 4px;
      border-left: 2px solid rgba(0,245,255,0.2); padding-left: 14px; align-self: flex-start;
    }
    .captcha-quote strong { color: #94a3b8; font-style: normal; }
    .captcha-divider { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent); }
    .captcha-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase;
      color: #475569; display: flex; align-items: center; gap: 7px; align-self: flex-start;
    }
    #hcaptcha-wrap { width: 100%; display: flex; justify-content: center; }
    .captcha-btn {
      width: 100%; padding: 13px;
      border-radius: 11px;
      background: linear-gradient(135deg, rgba(0,245,255,0.14), rgba(191,0,255,0.11));
      border: 1px solid rgba(0,245,255,0.25);
      color: #e2e8f0; font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      cursor: pointer; transition: all 0.28s ease;
      display: flex; align-items: center; justify-content: center; gap: 9px;
      opacity: 0.35; pointer-events: none;
    }
    .captcha-btn.ready { opacity: 1; pointer-events: all; box-shadow: 0 0 28px rgba(0,245,255,0.18); }
    .captcha-btn.ready:hover {
      background: linear-gradient(135deg, rgba(0,245,255,0.22), rgba(191,0,255,0.18));
      box-shadow: 0 0 40px rgba(0,245,255,0.28);
      transform: translateY(-1px);
    }
    @keyframes slideOut {
      to { opacity: 0; transform: translateY(-18px) scale(0.97); }
    }
    .captcha-exit { animation: slideOut 0.42s cubic-bezier(0.4,0,1,1) forwards; }
    #app { opacity: 0; transition: opacity 0.5s ease 0.1s; pointer-events: none; }
    #app.visible { opacity: 1; pointer-events: all; }
    .navbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(8,8,16,0.88);
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }
    .hamburger-btn {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 10px; border: 1px solid var(--glass-border);
      background: var(--glass-bg); cursor: pointer;
      transition: all 0.25s ease; color: #94a3b8; flex-shrink: 0;
    }
    .hamburger-btn:hover {
      background: var(--glass-hover); border-color: rgba(0,245,255,0.3); color: var(--neon-cyan);
      box-shadow: 0 0 16px rgba(0,245,255,0.12), inset 0 0 12px rgba(0,245,255,0.04);
      transform: scale(1.05);
    }
    @keyframes tabBounce {
      0%   { transform: translateY(0); }
      30%  { transform: translateY(-5px); }
      60%  { transform: translateY(2px); }
      100% { transform: translateY(0); }
    }
    .tab-btn {
      position: relative; padding: 7px 18px; border-radius: 9px;
      border: 1px solid transparent; background: transparent;
      color: #64748b; font-family: 'Syne', sans-serif;
      font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
      cursor: pointer; transition: color 0.25s ease; white-space: nowrap;
      display: flex; align-items: center; gap: 7px; text-transform: uppercase;
      animation: tabBounce 2.4s ease infinite;
    }
    #tab-games { animation-delay: 0.4s; }
    .tab-btn:hover { color: #e2e8f0; }
    .tab-btn.active {
      color: #fff; background: transparent; border-color: transparent;
    }
    .tab-btn.active svg { color: var(--neon-cyan); }
    .tab-btn::after {
      content: ''; position: absolute;
      bottom: -1px; left: 50%; right: 50%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
      transition: all 0.3s ease; border-radius: 2px;
    }
    .tab-btn.active::after { left: 8%; right: 8%; }
    .main-card {
      border-radius: 20px; border: 1px solid transparent;
      background: transparent;
      overflow: hidden; position: relative;
    }
    .main-card::before { display: none; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; animation: fadeSlide 0.38s ease forwards; }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #sidebar-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease; backdrop-filter: blur(4px);
    }
    #sidebar-overlay.open { opacity: 1; pointer-events: all; }
    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: 268px;
      background: rgba(8,8,16,0.97); border-right: 1px solid var(--glass-border);
      z-index: 101; transform: translateX(-100%);
      transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);
      padding: 24px 0; display: flex; flex-direction: column;
    }
    #sidebar.open { transform: translateX(0); }
    .sidebar-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 24px; color: #64748b; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s ease; border-left: 2px solid transparent;
    }
    .sidebar-item:hover { color: #e2e8f0; background: rgba(255,255,255,0.04); border-left-color: var(--neon-cyan); }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes logoReveal {
      from { opacity: 0; transform: translateY(-6px) scale(0.97); filter: blur(6px); }
      to   { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }
    .anim-navbar { animation: slideDown 0.55s cubic-bezier(0.22,1,0.36,1) both; }
    .anim-logo   { animation: logoReveal 0.7s cubic-bezier(0.22,1,0.36,1) 0.08s both; }
    .anim-tabs   { animation: slideDown 0.55s cubic-bezier(0.22,1,0.36,1) 0.18s both; }
    .anim-card   { animation: scaleIn 0.65s cubic-bezier(0.22,1,0.36,1) 0.28s both; }
    .code-box { border-radius: 14px; border: 1px solid rgba(255,255,255,0.09); background: #0b0b18; overflow: hidden; }
    .code-titlebar {
      display: flex; align-items: center; gap: 7px;
      padding: 11px 16px; border-bottom: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.025);
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .dot-red    { background: #ff5f57; box-shadow: 0 0 6px rgba(255,95,87,0.5); }
    .dot-yellow { background: #febc2e; box-shadow: 0 0 6px rgba(254,188,46,0.4); }
    .dot-green  { background: #28c840; box-shadow: 0 0 6px rgba(40,200,64,0.4); }
    .code-filename { font-family: 'DM Mono', monospace; font-size: 12px; color: #475569; margin-left: 6px; letter-spacing: 0.04em; }
    .code-body {
      padding: 24px; font-family: 'DM Mono', monospace;
      font-size: 13.5px; line-height: 1.8; color: #94a3b8;
      min-height: 140px; white-space: pre-wrap; word-break: break-word;
    }
    .action-btn {
      display: inline-flex; align-items: center; gap: 8px; padding: 9px 20px;
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04); color: #64748b;
      font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; transition: all 0.25s ease;
    }
    .action-btn:hover {
      border-color: rgba(0,245,255,0.3); background: rgba(0,245,255,0.07);
      color: var(--neon-cyan); box-shadow: 0 0 20px rgba(0,245,255,0.12); transform: translateY(-1px);
    }
    .action-btn.success { border-color: rgba(0,255,136,0.35); background: rgba(0,255,136,0.07); color: #00ff88; }
    .game-card {
      border-radius: 16px; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03); padding: 18px 24px;
      display: flex; flex-direction: row; align-items: center; gap: 20px;
      width: 100%; transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
      cursor: pointer;
    }
    .game-card:hover { transform: translateY(-3px); border-color: rgba(0,245,255,0.2); box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 32px rgba(0,245,255,0.06); }
    .game-logo-wrap {
      width: 64px; height: 64px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04); flex-shrink: 0;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .game-card:hover .game-logo-wrap { transform: scale(1.07); box-shadow: 0 0 24px rgba(0,245,255,0.2); }
    .game-logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
    .game-logo-fallback { font-size: 30px; line-height: 1; }
    .game-name { font-size: 15px; font-weight: 700; color: #e2e8f0; letter-spacing: -0.01em; }
    .game-status {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px; border-radius: 20px;
      font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
      letter-spacing: 0.04em; margin-top: 5px;
    }
    .game-status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .status-undetected { background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.25); color: #00ff88; }
    .status-undetected .game-status-dot { background: #00ff88; box-shadow: 0 0 6px rgba(0,255,136,0.6); animation: pulse-dot 2s infinite; }
    .status-detected { background: rgba(255,59,59,0.1); border: 1px solid rgba(255,59,59,0.25); color: #ff3b3b; }
    .status-detected .game-status-dot { background: #ff3b3b; }
    .status-testing { background: rgba(255,188,0,0.1); border: 1px solid rgba(255,188,0,0.25); color: #ffbc00; }
    .status-testing .game-status-dot { background: #ffbc00; animation: pulse-dot 1.2s infinite; }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }
    .game-card-arrow { margin-left: auto; color: #334155; flex-shrink: 0; transition: color 0.2s ease, transform 0.2s ease; }
    .game-card:hover .game-card-arrow { color: var(--neon-cyan); transform: translateX(3px); }

    /* ── Profile popup (Discord-style) ── */
    #profile-overlay {
      position: fixed; inset: 0; z-index: 400;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
    }
    #profile-overlay.open { opacity: 1; pointer-events: all; }

    #profile-card {
      width: 340px; max-width: calc(100vw - 32px);
      background: #111114;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.07);
      transform: scale(0.93) translateY(16px);
      transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
      max-height: 90vh; overflow-y: auto;
    }
    #profile-overlay.open #profile-card { transform: scale(1) translateY(0); }

    .profile-banner-wrap { position: relative; }
    .profile-banner-img {
      width: 100%; height: 100px; object-fit: cover; display: block;
    }
    .profile-banner-actions {
      position: absolute; top: 10px; right: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .profile-banner-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(0,0,0,0.55); border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #b0b8c8; position: relative;
      transition: background 0.2s ease, color 0.2s ease;
      backdrop-filter: blur(4px);
    }
    .profile-banner-btn:hover { background: rgba(0,0,0,0.8); color: #fff; }
    .profile-banner-btn.danger:hover { background: rgba(255,59,59,0.25); color: #ff3b3b; }

    /* three-dot inside profile */
    .profile-dot-menu {
      position: absolute; right: 0; top: 38px; z-index: 600;
      background: #1e1f26;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 6px;
      min-width: 180px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7);
      opacity: 0; pointer-events: none;
      transform: scale(0.95) translateY(-6px);
      transition: all 0.18s cubic-bezier(0.22,1,0.36,1);
      transform-origin: top right;
    }
    .profile-dot-menu.open { opacity: 1; pointer-events: all; transform: scale(1) translateY(0); }
    .profile-dot-menu-wrap { position: relative; }

    .profile-avatar-row {
      display: flex; align-items: flex-end; justify-content: space-between;
      padding: 0 16px; margin-top: -40px; margin-bottom: 10px;
    }
    .profile-avatar-wrap { position: relative; display: inline-block; }
    .profile-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      border: 6px solid #111114;
      object-fit: cover; background: #1a1a22; display: block;
    }
    .profile-status-badge {
      position: absolute; bottom: 5px; right: 3px;
      width: 18px; height: 18px; border-radius: 50%;
      border: 4px solid #111114;
    }

    .profile-body { padding: 0 16px 16px; }
    .profile-displayname {
      font-size: 20px; font-weight: 800; color: #f2f3f5;
      letter-spacing: -0.02em; line-height: 1.2;
    }
    .profile-username {
      font-family: 'DM Mono', monospace; font-size: 13px;
      color: #5c6370; margin-top: 2px;
    }
    .profile-badges { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .profile-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 20px;
      font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 600;
      letter-spacing: 0.05em;
    }
    .badge-status-pill { background: rgba(0,255,136,0.12); border: 1px solid rgba(0,255,136,0.25); color: #00ff88; }
    .badge-status-pill.detected { background: rgba(255,59,59,0.12); border-color: rgba(255,59,59,0.25); color: #ff3b3b; }
    .badge-status-pill.testing { background: rgba(255,188,0,0.12); border-color: rgba(255,188,0,0.25); color: #ffbc00; }
    .badge-status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; animation: pulse-dot 2s infinite; }

    .profile-inner-card {
      background: #1e1f26; border-radius: 10px;
      padding: 12px 14px; margin: 10px 0;
    }
    .profile-divider { height: 1px; background: rgba(255,255,255,0.07); margin: 10px 0; }
    .profile-section-label {
      font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; color: #5c6370; margin-bottom: 6px;
    }
    .profile-note {
      font-size: 13px; color: #94a3b8; line-height: 1.6;
      font-family: 'DM Mono', monospace; white-space: pre-wrap; word-break: break-word;
    }
    .profile-member-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: #94a3b8;
    }
    .profile-member-row svg { color: #5c6370; flex-shrink: 0; }

    .changelog-entry { background: transparent; border: none; padding: 0; min-height: unset; }
    .changelog-date {
      font-family: 'DM Mono', monospace; font-size: 11px;
      color: var(--neon-cyan); margin-bottom: 6px; letter-spacing: 0.04em;
    }
    .changelog-text { font-size: 13px; color: #94a3b8; line-height: 1.6; }

    .changelog-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 10px;
    }
    .cl-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 14px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: #64748b; font-family: 'Syne', sans-serif;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all 0.2s ease;
    }
    .cl-btn:hover:not(:disabled) { border-color: rgba(0,245,255,0.3); color: var(--neon-cyan); background: rgba(0,245,255,0.06); }
    .cl-btn:disabled { opacity: 0.25; cursor: default; }
    .cl-counter { font-family: 'DM Mono', monospace; font-size: 11px; color: #334155; }

    .profile-close {
      position: absolute; top: 10px; right: 12px;
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(0,0,0,0.5); border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #94a3b8; transition: all 0.2s ease;
    }
    .profile-close:hover { background: rgba(255,59,59,0.2); color: #ff3b3b; }
    .profile-banner-wrap { position: relative; }
    .three-dot-btn {
      width: 32px; height: 32px; border-radius: 8px;
      border: none; background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #475569; flex-shrink: 0;
      transition: all 0.2s ease; position: relative;
    }
    .three-dot-btn:hover { background: rgba(255,255,255,0.08); color: #94a3b8; }

    .dot-menu {
      position: absolute; right: 0; top: 38px; z-index: 200;
      background: #1e1f26;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 6px;
      min-width: 180px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      opacity: 0; pointer-events: none;
      transform: scale(0.95) translateY(-6px);
      transition: all 0.18s cubic-bezier(0.22,1,0.36,1);
      transform-origin: top right;
    }
    .dot-menu.open { opacity: 1; pointer-events: all; transform: scale(1) translateY(0); }

    .dot-menu-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 6px;
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
      color: #94a3b8; cursor: pointer; transition: all 0.15s ease;
    }
    .dot-menu-item:hover { background: rgba(0,245,255,0.08); color: var(--neon-cyan); }
    .dot-menu-item svg { flex-shrink: 0; }

    #features-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
    }
    #features-overlay.open { opacity: 1; pointer-events: all; }

    #features-card {
      width: 440px; max-width: calc(100vw - 32px);
      background: #18181e;
      border-radius: 18px; overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.85), 0 0 0 1px rgba(255,255,255,0.07);
      transform: scale(0.93) translateY(16px);
      transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
      max-height: 90vh; overflow-y: auto;
    }
    #features-overlay.open #features-card { transform: scale(1) translateY(0); }

    .features-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      position: sticky; top: 0; background: #18181e; z-index: 1;
    }
    .features-title {
      display: flex; align-items: center; gap: 10px;
      font-size: 16px; font-weight: 800; color: #f1f5f9;
    }
    .features-title img {
      width: 32px; height: 32px; border-radius: 8px; object-fit: contain;
    }
    .features-close {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(255,255,255,0.06); border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #64748b; transition: all 0.2s ease;
    }
    .features-close:hover { background: rgba(255,59,59,0.15); color: #ff3b3b; }

    .features-body { padding: 18px 20px 24px; }
    .features-section-label {
      font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; color: #475569;
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .features-section-label::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.06);
    }

    .feature-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 11px 14px; border-radius: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 8px;
      transition: all 0.2s ease;
    }
    .feature-item:hover { background: rgba(0,245,255,0.05); border-color: rgba(0,245,255,0.15); }
    .feature-item:last-child { margin-bottom: 0; }
    .feature-icon {
      width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
      background: rgba(0,245,255,0.08);
      border: 1px solid rgba(0,245,255,0.15);
      display: flex; align-items: center; justify-content: center;
      color: var(--neon-cyan);
    }
    .feature-name { font-size: 13px; font-weight: 700; color: #e2e8f0; line-height: 1.3; }
    .feature-desc { font-size: 12px; color: #475569; margin-top: 2px; line-height: 1.5; }

    .features-empty {
      text-align: center; padding: 32px 0;
      font-family: 'DM Mono', monospace; font-size: 12px; color: #334155;
    }

    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.28);
      color: #00ff88; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
      padding: 10px 22px; border-radius: 10px; backdrop-filter: blur(12px);
      z-index: 300; opacity: 0; transition: opacity 0.25s ease; pointer-events: none;
      display: flex; align-items: center; gap: 8px;
    }
    #toast.show { opacity: 1; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,245,255,0.18); }
  </style>
</head>

<script src="games.js"></script>
<script>
  fetch('variable.txt')
    .then(r => r.text())
    .then(txt => {
      const vars = {};
      txt.split('\n').forEach(line => {
        line = line.trim();
        if (!line || line.startsWith('#')) return;
        const eq = line.indexOf('=');
        if (eq === -1) return;
        vars[line.slice(0, eq).trim()] = line.slice(eq + 1).trim();
      });
      const siteKey = vars['HCAPTCHA_SITE_KEY'] || '';
      if (siteKey && siteKey !== 'YOUR_SITE_KEY_HERE') {
        hcaptcha.render('hcaptcha-widget', {
          sitekey: siteKey,
          theme: 'dark',
          callback: onCaptchaSuccess
        });
      } else {
        document.getElementById('hcaptcha-widget').innerHTML =
          '<div style="font-family:\'DM Mono\',monospace;font-size:11px;color:#475569;text-align:center;padding:10px 0;">Add your hCaptcha site key in variable.txt</div>';
        onCaptchaSuccess();
      }
      document.getElementById('lua-code').textContent = vars['CODEBOX_TEXT'] || '';
    })
    .catch(() => {
      document.getElementById('hcaptcha-widget').innerHTML =
        '<div style="font-family:\'DM Mono\',monospace;font-size:11px;color:#475569;text-align:center;padding:10px 0;">variable.txt not found</div>';
      onCaptchaSuccess();
    });

  function onCaptchaSuccess() {
    document.getElementById('captcha-btn').classList.add('ready');
  }

  function enterSite() {
    const screen = document.getElementById('captcha-screen');
    screen.classList.add('captcha-exit');
    setTimeout(() => {
      screen.style.display = 'none';
      document.getElementById('app').classList.add('visible');
    }, 420);
  }

  function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebar-overlay').classList.add('open');
  }

  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSidebar(); });

  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById('tab-' + name);
    if (btn) btn.classList.add('active');
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    const panel = document.getElementById('panel-' + name);
    if (panel) panel.classList.add('active');
  }

  function statusClass(s) {
    if (!s) return '';
    const l = s.toLowerCase();
    if (l === 'undetected') return 'status-undetected';
    if (l === 'detected') return 'status-detected';
    return 'status-testing';
  }
  function statusDotColor(s) {
    if (!s) return '#475569';
    const l = s.toLowerCase();
    if (l === 'undetected') return '#00ff88';
    if (l === 'detected') return '#ff3b3b';
    return '#ffbc00';
  }

  function renderGames() {
    const list = document.getElementById('games-list');
    if (!list) return;
    if (!window.GAMES || !GAMES.length) {
      list.innerHTML = '<div style="text-align:center;color:#475569;font-family:\'DM Mono\',monospace;font-size:13px;padding:48px 0;">No games listed yet.</div>';
      return;
    }
    list.innerHTML = '';
    GAMES.forEach((game, idx) => {
      const card = document.createElement('div');
      card.className = 'game-card';
      card.onclick = () => openProfile(idx);

      const wrap = document.createElement('div');
      wrap.className = 'game-logo-wrap';
      const img = document.createElement('img');
      img.src = game.logo;
      img.alt = game.name;
      img.onerror = () => { wrap.innerHTML = '<span class="game-logo-fallback">🎮</span>'; };
      wrap.appendChild(img);

      const info = document.createElement('div');
      info.style.cssText = 'display:flex;flex-direction:column;gap:5px;flex:1;';

      const nameEl = document.createElement('div');
      nameEl.className = 'game-name';
      nameEl.textContent = game.name;

      const statusEl = document.createElement('div');
      statusEl.className = 'game-status ' + statusClass(game.status);
      statusEl.innerHTML = '<div class="game-status-dot"></div>' + (game.status || 'Unknown');

      info.appendChild(nameEl);
      info.appendChild(statusEl);

      const arrow = document.createElement('div');
      arrow.className = 'game-card-arrow';
      arrow.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';

      card.appendChild(wrap);
      card.appendChild(info);
      card.appendChild(arrow);
      list.appendChild(card);
    });
  }

  function closeAllMenus() {
    document.querySelectorAll('.dot-menu').forEach(m => m.classList.remove('open'));
  }
  document.addEventListener('click', closeAllMenus);

  function openFeatures(idx) {
    const game = GAMES[idx];
    document.getElementById('feat-logo').src = game.logo;
    document.getElementById('feat-title').textContent = game.name + ' — Script Features';
    const list = document.getElementById('feat-list');
    const features = game.features || [];
    if (!features.length) {
      list.innerHTML = '<div class="features-empty">No features listed yet.</div>';
    } else {
      list.innerHTML = features.map(f => `
        <div class="feature-item">
          <div class="feature-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          </div>
          <div>
            <div class="feature-name">${f.name}</div>
            ${f.desc ? '<div class="feature-desc">' + f.desc + '</div>' : ''}
          </div>
        </div>
      `).join('');
    }
    document.getElementById('features-overlay').classList.add('open');
  }

  function closeFeatures() {
    document.getElementById('features-overlay').classList.remove('open');
  }
  function closeFeaturesOutside(e) {
    if (e.target === document.getElementById('features-overlay')) closeFeatures();
  }

  let clIndex = 0;
  let clGame = null;

  function openProfile(idx) {
    clGame = GAMES[idx];
    clIndex = 0;
    document.getElementById('profile-avatar').src = clGame.logo;
    document.getElementById('profile-displayname').textContent = clGame.name;
    document.getElementById('profile-username').textContent = clGame.name.toLowerCase().replace(/\s+/g, '') + '.game';

    // Banner color derived from status
    const bannerColors = {
      undetected: 'linear-gradient(135deg,#003d20,#006630)',
      detected:   'linear-gradient(135deg,#3d0000,#660000)',
      testing:    'linear-gradient(135deg,#3d2e00,#665000)',
    };
    const sl = (clGame.status || '').toLowerCase();
    document.getElementById('profile-banner-color').style.background =
      bannerColors[sl] || 'linear-gradient(135deg,#0d0d1a,#1a1a2e)';

    // Status badge dot color
    const badge = document.getElementById('profile-status-badge');
    badge.style.background = statusDotColor(clGame.status);
    badge.style.boxShadow = '0 0 6px ' + statusDotColor(clGame.status);

    // Status pill
    const sc = statusClass(clGame.status);
    const pillClass = sl === 'undetected' ? '' : sl === 'detected' ? ' detected' : ' testing';
    document.getElementById('profile-status-pill').innerHTML =
      '<div class="profile-badge badge-status-pill' + pillClass + '"><div class="badge-status-dot" style="background:' + statusDotColor(clGame.status) + '"></div>' + (clGame.status || 'Unknown') + '</div>';

    // Script note
    document.getElementById('profile-note').textContent = clGame.note || 'No status note provided.';

    // Wire up features button inside profile menu
    document.getElementById('profile-features-btn').onclick = () => {
      closeProfileMenu();
      openFeatures(idx);
    };

    renderChangelog();
    document.getElementById('profile-overlay').classList.add('open');
  }

  function toggleProfileMenu(e) {
    e.stopPropagation();
    const menu = document.getElementById('profile-dot-menu');
    menu.classList.toggle('open');
  }
  function closeProfileMenu() {
    document.getElementById('profile-dot-menu').classList.remove('open');
  }

  function renderChangelog() {
    const logs = clGame.changelogs || [];
    const total = logs.length;
    const entry = logs[clIndex] || null;
    const dateText = entry ? entry.date : '—';
    document.getElementById('cl-date').textContent = dateText;
    document.getElementById('cl-date-inline').textContent = dateText;
    document.getElementById('cl-text').textContent = entry ? entry.text : 'No changelogs yet.';
    document.getElementById('cl-counter').textContent = total ? (clIndex + 1) + ' / ' + total : '0';
    document.getElementById('cl-prev').disabled = clIndex === 0;
    document.getElementById('cl-next').disabled = clIndex >= total - 1;
  }

  function clNav(dir) {
    const total = (clGame.changelogs || []).length;
    clIndex = Math.max(0, Math.min(total - 1, clIndex + dir));
    renderChangelog();
  }

  function closeProfile(e) {
    if (e.target === document.getElementById('profile-overlay')) closeProfileDirect();
  }
  function closeProfileDirect() {
    document.getElementById('profile-overlay').classList.remove('open');
  }

  function shareLink() {
    const url = window.location.href;
    const btn = document.getElementById('share-btn');
    const done = () => { btn.classList.add('success'); setTimeout(() => btn.classList.remove('success'), 2200); };
    if (navigator.share) {
      navigator.share({ title: 'NexxToHub', url }).then(done).catch(() => {});
    } else {
      navigator.clipboard.writeText(url).then(() => { showToast('Link copied!'); done(); });
    }
  }

  function copyCode() {
    const code = document.getElementById('lua-code').textContent;
    const btn = document.getElementById('copy-btn');
    navigator.clipboard.writeText(code).then(() => {
      showToast('Code copied!');
      btn.classList.add('success');
      setTimeout(() => btn.classList.remove('success'), 2200);
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  renderGames();
</script>
</body>
</html>
