<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse.dev</title>
  <link rel="icon" type="image/png" href="pulsedevlogo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --neon-cyan:    #00f5ff;
      --neon-purple:  #bf00ff;
      --glass-bg:     rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.08);
      --glass-hover:  rgba(255,255,255,0.07);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Syne', sans-serif;
      background: #080810;
      color: #e2e8f0;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 15% 20%, rgba(0,245,255,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 85% 75%, rgba(191,0,255,0.06) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none; z-index: 0;
    }
    .layer { position: relative; z-index: 1; }
    #captcha-screen {
      position: fixed; inset: 0; z-index: 200;
      background: #080810;
      display: flex; align-items: center; justify-content: center;
    }
    #captcha-screen::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 30% 30%, rgba(0,245,255,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 75% 70%, rgba(191,0,255,0.08) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }
    #captcha-screen::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none; z-index: 0;
    }
    .captcha-card {
      position: relative; z-index: 1;
      width: 440px;
      max-width: calc(100vw - 40px);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 22px;
      padding: 40px 36px 34px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 40px 100px rgba(0,0,0,0.7),
        0 0 80px rgba(0,245,255,0.05);
      display: flex; flex-direction: column; align-items: center; gap: 22px;
      animation: captchaIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes captchaIn {
      from { opacity: 0; transform: translateY(24px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .captcha-logo { display: flex; align-items: center; gap: 10px; }
    .captcha-logo img { width: 38px; height: 38px; object-fit: contain; border-radius: 9px; }
    .captcha-logo-text { font-size: 22px; font-weight: 800; color: #f1f5f9; letter-spacing: -0.03em; }
    .captcha-logo-text em { color: var(--neon-cyan); font-style: normal; text-shadow: 0 0 12px rgba(0,245,255,0.5); }
    .captcha-quote {
      font-size: 13px; color: #64748b; text-align: center; line-height: 1.7;
      font-style: italic; font-family: 'DM Mono', monospace; padding: 0 4px;
      border-left: 2px solid rgba(0,245,255,0.2); padding-left: 14px; align-self: flex-start;
    }
    .captcha-quote strong { color: #94a3b8; font-style: normal; }
    .captcha-divider { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent); }
    .captcha-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase;
      color: #475569; display: flex; align-items: center; gap: 7px; align-self: flex-start;
    }
    #hcaptcha-wrap { width: 100%; display: flex; justify-content: center; }
    .captcha-btn {
      width: 100%; padding: 13px;
      border-radius: 11px;
      background: linear-gradient(135deg, rgba(0,245,255,0.14), rgba(191,0,255,0.11));
      border: 1px solid rgba(0,245,255,0.25);
      color: #e2e8f0; font-family: 'Syne', sans-serif;
      font-size: 14px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      cursor: pointer; transition: all 0.28s ease;
      display: flex; align-items: center; justify-content: center; gap: 9px;
      opacity: 0.35; pointer-events: none;
    }
    .captcha-btn.ready { opacity: 1; pointer-events: all; box-shadow: 0 0 28px rgba(0,245,255,0.18); }
    .captcha-btn.ready:hover {
      background: linear-gradient(135deg, rgba(0,245,255,0.22), rgba(191,0,255,0.18));
      box-shadow: 0 0 40px rgba(0,245,255,0.28);
      transform: translateY(-1px);
    }
    @keyframes slideOut {
      to { opacity: 0; transform: translateY(-18px) scale(0.97); }
    }
    .captcha-exit { animation: slideOut 0.42s cubic-bezier(0.4,0,1,1) forwards; }
    #app { opacity: 0; transition: opacity 0.5s ease 0.1s; pointer-events: none; }
    #app.visible { opacity: 1; pointer-events: all; }
    .navbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(8,8,16,0.88);
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }
    .hamburger-btn {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 10px; border: 1px solid var(--glass-border);
      background: var(--glass-bg); cursor: pointer;
      transition: all 0.25s ease; color: #94a3b8; flex-shrink: 0;
    }
    .hamburger-btn:hover {
      background: var(--glass-hover); border-color: rgba(0,245,255,0.3); color: var(--neon-cyan);
      box-shadow: 0 0 16px rgba(0,245,255,0.12), inset 0 0 12px rgba(0,245,255,0.04);
      transform: scale(1.05);
    }
    .tab-btn {
      position: relative; padding: 7px 18px; border-radius: 9px;
      border: 1px solid var(--glass-border); background: var(--glass-bg);
      color: #64748b; font-family: 'Syne', sans-serif;
      font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
      cursor: pointer; transition: all 0.28s ease; white-space: nowrap;
      display: flex; align-items: center; gap: 7px; text-transform: uppercase;
    }
    .tab-btn:hover {
      color: #e2e8f0; background: var(--glass-hover);
      border-color: rgba(167,139,250,0.3); box-shadow: 0 0 18px rgba(167,139,250,0.1);
      transform: translateY(-1px);
    }
    .tab-btn.active {
      color: #fff; background: rgba(0,245,255,0.07);
      border-color: rgba(0,245,255,0.38);
      box-shadow: 0 0 22px rgba(0,245,255,0.13), inset 0 0 14px rgba(0,245,255,0.04);
    }
    .tab-btn.active svg { color: var(--neon-cyan); }
    .tab-btn::after {
      content: ''; position: absolute;
      bottom: -1px; left: 50%; right: 50%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
      transition: all 0.3s ease; border-radius: 2px;
    }
    .tab-btn.active::after { left: 8%; right: 8%; }
    .main-card {
      border-radius: 20px; border: 1px solid var(--glass-border);
      background: linear-gradient(160deg, rgba(255,255,255,0.035) 0%, rgba(255,255,255,0.01) 100%);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 32px 80px rgba(0,0,0,0.6),
        0 0 60px rgba(0,245,255,0.03);
      overflow: hidden; position: relative;
    }
    .main-card::before {
      content: ''; position: absolute;
      top: 0; left: 8%; right: 8%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,245,255,0.2), rgba(167,139,250,0.2), transparent);
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; animation: fadeSlide 0.38s ease forwards; }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #sidebar-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease; backdrop-filter: blur(4px);
    }
    #sidebar-overlay.open { opacity: 1; pointer-events: all; }
    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: 268px;
      background: rgba(8,8,16,0.97); border-right: 1px solid var(--glass-border);
      z-index: 101; transform: translateX(-100%);
      transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);
      padding: 24px 0; display: flex; flex-direction: column;
    }
    #sidebar.open { transform: translateX(0); }
    .sidebar-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 24px; color: #64748b; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s ease; border-left: 2px solid transparent;
    }
    .sidebar-item:hover { color: #e2e8f0; background: rgba(255,255,255,0.04); border-left-color: var(--neon-cyan); }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes logoReveal {
      from { opacity: 0; transform: translateY(-6px) scale(0.97); filter: blur(6px); }
      to   { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }
    .anim-navbar { animation: slideDown 0.55s cubic-bezier(0.22,1,0.36,1) both; }
    .anim-logo   { animation: logoReveal 0.7s cubic-bezier(0.22,1,0.36,1) 0.08s both; }
    .anim-tabs   { animation: slideDown 0.55s cubic-bezier(0.22,1,0.36,1) 0.18s both; }
    .anim-card   { animation: scaleIn 0.65s cubic-bezier(0.22,1,0.36,1) 0.28s both; }
    .code-box { border-radius: 14px; border: 1px solid rgba(255,255,255,0.09); background: #0b0b18; overflow: hidden; }
    .code-titlebar {
      display: flex; align-items: center; gap: 7px;
      padding: 11px 16px; border-bottom: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.025);
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .dot-red    { background: #ff5f57; box-shadow: 0 0 6px rgba(255,95,87,0.5); }
    .dot-yellow { background: #febc2e; box-shadow: 0 0 6px rgba(254,188,46,0.4); }
    .dot-green  { background: #28c840; box-shadow: 0 0 6px rgba(40,200,64,0.4); }
    .code-filename { font-family: 'DM Mono', monospace; font-size: 12px; color: #475569; margin-left: 6px; letter-spacing: 0.04em; }
    .code-body {
      padding: 24px; font-family: 'DM Mono', monospace;
      font-size: 13.5px; line-height: 1.8; color: #94a3b8;
      min-height: 140px; white-space: pre-wrap; word-break: break-word;
    }
    .action-btn {
      display: inline-flex; align-items: center; gap: 8px; padding: 9px 20px;
      border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04); color: #64748b;
      font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; transition: all 0.25s ease;
    }
    .action-btn:hover {
      border-color: rgba(0,245,255,0.3); background: rgba(0,245,255,0.07);
      color: var(--neon-cyan); box-shadow: 0 0 20px rgba(0,245,255,0.12); transform: translateY(-1px);
    }
    .action-btn.success { border-color: rgba(0,255,136,0.35); background: rgba(0,255,136,0.07); color: #00ff88; }
    .game-card {
      border-radius: 16px; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03); padding: 20px 28px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      width: 100%; transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
      cursor: default;
    }
    .game-card:hover { transform: translateY(-3px); border-color: rgba(0,245,255,0.2); box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 32px rgba(0,245,255,0.06); }
    .game-logo-wrap {
      width: 88px; height: 88px; border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04); flex-shrink: 0;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .game-card:hover .game-logo-wrap { transform: scale(1.07); box-shadow: 0 0 24px rgba(0,245,255,0.2); }
    .game-logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
    .game-logo-fallback { font-size: 38px; line-height: 1; }
    .game-name { font-size: 15px; font-weight: 700; color: #e2e8f0; text-align: center; letter-spacing: -0.01em; }
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.28);
      color: #00ff88; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
      padding: 10px 22px; border-radius: 10px; backdrop-filter: blur(12px);
      z-index: 300; opacity: 0; transition: opacity 0.25s ease; pointer-events: none;
      display: flex; align-items: center; gap: 8px;
    }
    #toast.show { opacity: 1; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,245,255,0.18); }
  </style>
</head>
<body>

<div id="captcha-screen">
  <div class="captcha-card">
    <div class="captcha-logo">
      <img src="pulsedevlogo.png" alt="logo" onerror="this.style.display='none'" />
      <span class="captcha-logo-text">Pulse<em>.</em>dev</span>
    </div>
    <p class="captcha-quote">
      <strong>"</strong> Great software is not built overnight —
      it's crafted line by line, commit by commit. <strong>"</strong>
    </p>
    <div class="captcha-divider"></div>
    <span class="captcha-label">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--neon-cyan)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Verify you're human
    </span>
    <div id="hcaptcha-wrap">
      <div id="hcaptcha-widget"></div>
    </div>
    <button class="captcha-btn" id="captcha-btn" onclick="enterSite()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Enter Pulse.dev
    </button>
  </div>
</div>

<div id="app">
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>
  <aside id="sidebar">
    <div style="padding:0 24px 20px;border-bottom:1px solid var(--glass-border);margin-bottom:10px;display:flex;align-items:center;gap:10px;">
      <img src="pulsedevlogo.png" alt="" style="width:28px;height:28px;object-fit:contain;border-radius:6px;" onerror="this.style.display='none'" />
      <span style="font-size:16px;font-weight:800;color:#f1f5f9;letter-spacing:-0.02em;">Pulse<span style="color:var(--neon-cyan);">.</span>dev</span>
    </div>
    <nav style="flex:1;overflow-y:auto;">
      <div class="sidebar-item" onclick="switchTab('info');closeSidebar()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        Info
      </div>
      <div class="sidebar-item" onclick="switchTab('games');closeSidebar()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><circle cx="15.5" cy="11" r="0.5" fill="currentColor"/><circle cx="17.5" cy="13" r="0.5" fill="currentColor"/><rect x="2" y="6" width="20" height="12" rx="2"/></svg>
        Supported Games
      </div>
    </nav>
  </aside>

  <header class="navbar anim-navbar">
    <div class="layer" style="max-width:1400px;margin:0 auto;padding:0 20px;">
      <div style="height:60px;display:flex;align-items:center;gap:14px;">
        <button class="hamburger-btn" onclick="openSidebar()" aria-label="Menu">
          <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="anim-logo" style="display:flex;align-items:center;gap:10px;">
          <img src="pulsedevlogo.png" alt="Pulse.dev"
            style="height:34px;width:34px;object-fit:contain;border-radius:8px;transition:filter 0.3s ease;"
            onmouseenter="this.style.filter='drop-shadow(0 0 10px rgba(0,245,255,0.55))'"
            onmouseleave="this.style.filter='none'"
            onerror="this.style.display='none'" />
          <span style="font-size:21px;font-weight:800;letter-spacing:-0.03em;color:#f1f5f9;line-height:1;">
            Pulse<span style="color:var(--neon-cyan);text-shadow:0 0 12px rgba(0,245,255,0.45);">.</span>dev
          </span>
        </div>
      </div>
      <div class="anim-tabs" style="display:flex;align-items:center;gap:8px;padding-bottom:12px;">
        <button class="tab-btn active" id="tab-info" onclick="switchTab('info')">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          Info
        </button>
        <button class="tab-btn" id="tab-games" onclick="switchTab('games')">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><circle cx="15.5" cy="11" r="0.5" fill="currentColor"/><circle cx="17.5" cy="13" r="0.5" fill="currentColor"/><rect x="2" y="6" width="20" height="12" rx="2"/></svg>
          Supported Games
        </button>
      </div>
    </div>
  </header>

  <main class="layer" style="padding:24px 20px 48px;max-width:1400px;margin:0 auto;">
    <div class="main-card anim-card" style="min-height:calc(100vh - 188px);">

      <div id="panel-info" class="tab-panel active" style="padding:32px;">
        <div class="code-box">
          <div class="code-titlebar">
            <div class="dot dot-red"></div>
            <div class="dot dot-yellow"></div>
            <div class="dot dot-green"></div>
            <span class="code-filename">main.lua</span>
            <div style="flex:1;"></div>
            <span style="font-family:'DM Mono',monospace;font-size:10px;color:#334155;letter-spacing:0.06em;">LUA 5.4</span>
          </div>
          <div class="code-body" id="lua-code"></div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:18px;flex-wrap:wrap;">
          <button class="action-btn" id="share-btn" onclick="shareLink()">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            Share
          </button>
          <button class="action-btn" id="copy-btn" onclick="copyCode()">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy Code
          </button>
        </div>
      </div>

      <div id="panel-games" class="tab-panel" style="padding:32px;">
        <div id="games-list" style="display:flex;flex-direction:column;gap:12px;"></div>
      </div>

    </div>
  </main>
</div>

<div id="toast">
  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toast-msg">Copied!</span>
</div>

<script src="games.js"></script>
<script>
  fetch('variable.txt')
    .then(r => r.text())
    .then(txt => {
      const vars = {};
      txt.split('\n').forEach(line => {
        line = line.trim();
        if (!line || line.startsWith('#')) return;
        const eq = line.indexOf('=');
        if (eq === -1) return;
        vars[line.slice(0, eq).trim()] = line.slice(eq + 1).trim();
      });
      const siteKey = vars['HCAPTCHA_SITE_KEY'] || '';
      if (siteKey && siteKey !== 'YOUR_SITE_KEY_HERE') {
        hcaptcha.render('hcaptcha-widget', {
          sitekey: siteKey,
          theme: 'dark',
          callback: onCaptchaSuccess
        });
      } else {
        document.getElementById('hcaptcha-widget').innerHTML =
          '<div style="font-family:\'DM Mono\',monospace;font-size:11px;color:#475569;text-align:center;padding:10px 0;">Add your hCaptcha site key in variable.txt</div>';
        onCaptchaSuccess();
      }
      document.getElementById('lua-code').textContent = vars['CODEBOX_TEXT'] || '';
    })
    .catch(() => {
      document.getElementById('hcaptcha-widget').innerHTML =
        '<div style="font-family:\'DM Mono\',monospace;font-size:11px;color:#475569;text-align:center;padding:10px 0;">variable.txt not found</div>';
      onCaptchaSuccess();
    });

  function onCaptchaSuccess() {
    document.getElementById('captcha-btn').classList.add('ready');
  }

  function enterSite() {
    const screen = document.getElementById('captcha-screen');
    screen.classList.add('captcha-exit');
    setTimeout(() => {
      screen.style.display = 'none';
      document.getElementById('app').classList.add('visible');
    }, 420);
  }

  function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebar-overlay').classList.add('open');
  }

  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSidebar(); });

  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById('tab-' + name);
    if (btn) btn.classList.add('active');
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    const panel = document.getElementById('panel-' + name);
    if (panel) panel.classList.add('active');
  }

  function renderGames() {
    const list = document.getElementById('games-list');
    if (!list || !window.GAMES || !GAMES.length) return;
    list.innerHTML = '';
    GAMES.forEach(game => {
      const card = document.createElement('div');
      card.className = 'game-card';
      const wrap = document.createElement('div');
      wrap.className = 'game-logo-wrap';
      const img = document.createElement('img');
      img.src = game.logo;
      img.alt = game.name;
      img.onerror = function () { wrap.innerHTML = '<span class="game-logo-fallback">🎮</span>'; };
      wrap.appendChild(img);
      const nameEl = document.createElement('div');
      nameEl.className = 'game-name';
      nameEl.textContent = game.name;
      card.appendChild(wrap);
      card.appendChild(nameEl);
      list.appendChild(card);
    });
  }
  renderGames();

  function shareLink() {
    const url = window.location.href;
    const btn = document.getElementById('share-btn');
    const done = () => { btn.classList.add('success'); setTimeout(() => btn.classList.remove('success'), 2200); };
    if (navigator.share) {
      navigator.share({ title: 'Pulse.dev', url }).then(done).catch(() => {});
    } else {
      navigator.clipboard.writeText(url).then(() => { showToast('Link copied!'); done(); });
    }
  }

  function copyCode() {
    const code = document.getElementById('lua-code').textContent;
    const btn = document.getElementById('copy-btn');
    navigator.clipboard.writeText(code).then(() => {
      showToast('Code copied!');
      btn.classList.add('success');
      setTimeout(() => btn.classList.remove('success'), 2200);
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }
</script>
</body>
</html>
